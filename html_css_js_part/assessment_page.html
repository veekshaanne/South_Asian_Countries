.question-card{

.wrong{

}

}
.option input{

.submit-container{

}

.btn{

border-radius:8px;

transition:.3s;
}

.btn:hover{

transform:scale(1.05);
}

.result-box{

padding:2rem;

color:#ffd700;

margin:1rem 0;

<div class="container">

<div class="header">
<h1>Knowledge Assessment</h1>
<p>Test your understanding of India, Maldives, and Nepal</p>
</div>

<!-- Difficulty Selection -->
<div id="selectionBox" class="question-card">

<h3>Select Difficulty</h3>

<div class="options">

<label class="option">
<input type="radio" name="difficulty" value="easy"> Easy
</label>

<label class="option">
<input type="radio" name="difficulty" value="medium"> Medium
</label>

<label class="option">
<input type="radio" name="difficulty" value="hard"> Hard
</label>

</div>

<div class="submit-container">
<button class="btn" onclick="startQuiz()">Show Assessment</button>
</div>

</div>

<!-- Questions -->
<div id="quizContainer"></div>

</div>

<script>

const quizzes={

easy:[

{q:"Which famous monument is located in Agra?",
options:["Red Fort","Gateway of India","Taj Mahal","Qutub Minar"],
answer:2,
exp:"The Taj Mahal in Agra is one of India's most famous monuments."},

{q:"What is the capital of Maldives?",
options:["Colombo","Mumbai","Malé","Kathmandu"],
answer:2,
exp:"Malé is the capital city of the Maldives."},

{q:"Which ocean surrounds Maldives?",
options:["Atlantic","Indian","Pacific","Arctic"],
answer:1,
exp:"Maldives is located in the Indian Ocean."},

{q:"Where is Mount Everest located?",
options:["India","Nepal","China","Bhutan"],
answer:1,
exp:"Mount Everest lies in the Himalayas in Nepal."},

{q:"Which food is common in Nepal?",
options:["Dal Bhat","Pizza","Burger","Tacos"],
answer:0,
exp:"Dal Bhat is Nepal’s staple dish."},

{q:"Which country is famous for the Taj Mahal?",
options:["India","Nepal","Maldives","Sri Lanka"],
answer:0,
exp:"The Taj Mahal is located in India."},

{q:"Who was born in Lumbini?",
options:["Gandhi","Buddha","Nehru","Tagore"],
answer:1,
exp:"Gautama Buddha was born in Lumbini, Nepal."},

{q:"What dance is traditional in Maldives?",
options:["Kathak","Bodu Beru","Ballet","Hip Hop"],
answer:1,
exp:"Bodu Beru is traditional Maldivian music and dance."},

{q:"Nepal lies in which mountain range?",
options:["Andes","Himalayas","Alps","Rockies"],
answer:1,
exp:"Nepal is located in the Himalayas."},

{q:"What are Nepalese dumplings called?",
options:["Momos","Sushi","Ravioli","Pasta"],
answer:0,
exp:"Momos are popular dumplings in Nepal."}

],

medium:[

{q:"Which river is considered sacred in India?",
options:["Nile","Ganges","Amazon","Danube"],
answer:1,
exp:"The Ganges River is sacred in Indian culture."},

{q:"What language is widely spoken in Maldives?",
options:["Dhivehi","Hindi","Nepali","Tamil"],
answer:0,
exp:"Dhivehi is the official language of Maldives."},

{q:"Which festival is major in Nepal?",
options:["Dashain","Halloween","Thanksgiving","Oktoberfest"],
answer:0,
exp:"Dashain is the biggest festival in Nepal."},

{q:"Which Indian monument is a UNESCO site?",
options:["Taj Mahal","Statue of Liberty","Big Ben","Eiffel Tower"],
answer:0,
exp:"The Taj Mahal is a UNESCO World Heritage Site."},

{q:"What ecosystem surrounds Maldives?",
options:["Coral reefs","Deserts","Grasslands","Tundra"],
answer:0,
exp:"Maldives is famous for coral reef ecosystems."},

{q:"Nepal’s capital city?",
options:["Pokhara","Kathmandu","Bhaktapur","Lalitpur"],
answer:1,
exp:"Kathmandu is Nepal’s capital."},

{q:"Which animal is native to India?",
options:["Bengal Tiger","Penguin","Kangaroo","Polar Bear"],
answer:0,
exp:"The Bengal Tiger is India’s national animal."},

{q:"Maldives economy relies heavily on?",
options:["Mining","Tourism","Manufacturing","Oil"],
answer:1,
exp:"Tourism drives Maldives’ economy."},

{q:"Nepal is famous for trekking in which mountains?",
options:["Andes","Himalayas","Rockies","Alps"],
answer:1,
exp:"The Himalayas attract trekkers worldwide."},

{q:"India has how many official languages approximately?",
options:["2","10","22","50"],
answer:2,
exp:"India recognizes 22 official languages."}

],

hard:[

{q:"Which Mughal emperor built the Taj Mahal?",
options:["Akbar","Shah Jahan","Babur","Aurangzeb"],
answer:1,
exp:"Shah Jahan built the Taj Mahal in memory of Mumtaz Mahal."},

{q:"What type of islands form Maldives?",
options:["Volcanic","Coral Atolls","Continental","Artificial"],
answer:1,
exp:"Maldives islands are coral atolls."},

{q:"Which mountain range forms Nepal’s northern border?",
options:["Himalayas","Alps","Andes","Rockies"],
answer:0,
exp:"The Himalayas form Nepal's northern border."},

{q:"Which Indian leader led the independence movement?",
options:["Mahatma Gandhi","Hitler","Lincoln","Churchill"],
answer:0,
exp:"Gandhi led India's non-violent independence movement."},

{q:"Nepal officially became a republic in?",
options:["2008","1990","2015","1980"],
answer:0,
exp:"Nepal abolished monarchy in 2008."},

{q:"Maldives highest point is approximately?",
options:["2m","5m","10m","50m"],
answer:1,
exp:"Maldives highest natural point is around 5 meters."},

{q:"Which philosophy originated with Buddha?",
options:["Buddhism","Hinduism","Confucianism","Shinto"],
answer:0,
exp:"Buddhism originated from Gautama Buddha."},

{q:"Which Indian festival celebrates lights?",
options:["Holi","Diwali","Eid","Baisakhi"],
answer:1,
exp:"Diwali is the Festival of Lights."},

{q:"What is Nepal’s traditional dumpling?",
options:["Momo","Dim Sum","Gyoza","Pierogi"],

exp:"Momos are a traditional Nepali food."},

{q:"Which oceanic current influences Maldives climate?",
options:["Indian Ocean Monsoon","Gulf Stream","El Niño","Antarctic Drift"],
answer:0,
exp:"Monsoon currents influence Maldives climate."}

]

};

let currentQuiz=[];

function startQuiz(){

let diff=document.querySelector("input[name='difficulty']:checked");

if(!diff){
alert("Please select a difficulty");
return;
}

currentQuiz=quizzes[diff.value];

document.getElementById("selectionBox").style.display="none";

let html="";

currentQuiz.forEach((q,i)=>{

html+=`
<div class="question-card" id="card${i}">
<h3>${i+1}. ${q.q}</h3>

<div class="options">
${q.options.map((opt,index)=>`
<label class="option">
<input type="radio" name="q${i}" value="${index}">
${opt}
</label>
`).join("")}
</div>

<p class="explanation" id="exp${i}">Explanation: ${q.exp}</p>

</div>
`;

});

document.getElementById("quizContainer").innerHTML=html;

document.getElementById("submitContainer").style.display="block";

}

function submitQuiz(){

let score=0;
let unanswered=false;

currentQuiz.forEach((q,i)=>{

let ans=document.querySelector(`input[name="q${i}"]:checked`);

if(!ans){
unanswered=true;
return;
}

let options=document.querySelectorAll(`#card${i} .option`);

options[q.answer].classList.add("correct");

if(Number(ans.value)===q.answer){
score++;
}else{
options[ans.value].classList.add("wrong");
}

document.getElementById("exp"+i).style.display="block";

});

if(unanswered){
alert("Please answer all questions before submitting.");
return;
}

document.getElementById("score-display").innerText=score+"/10";

document.getElementById("feedback").innerText="Review explanations under each question to learn more.";

document.getElementById("result-box").style.display="block";

}

function retakeQuiz(){

location.reload();

}

</script>
